<!DOCTYPE html>
<html lang="ko" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AI Virtual Company - Multi-agent collaboration system" />
    <meta name="theme-color" content="#ffffff" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'surface-bright': '#f5f7f9',
              'surface': '#f5f7f9',
              'surface-container': '#e5e9eb',
              'surface-container-low': '#eef1f3',
              'surface-container-lowest': '#ffffff',
              'primary': '#475569',
              'primary-dim': '#334155',
              'primary-container': '#94a3b8',
              'on-primary': '#f8fafc',
              'secondary': '#702ae1',
              'secondary-container': '#dcc9ff',
              'on-secondary': '#f8f0ff',
              'tertiary': '#4e5a81',
              'on-surface': '#2c2f31',
              'on-surface-variant': '#595c5e',
              'outline': '#747779',
              'outline-variant': '#abadaf',
              'error': '#b41340',
              'background': '#f5f7f9',
            },
            width: {
              'sidebar': '280px',
              'panel': '320px',
            },
            maxWidth: {
              'chat': '42rem',
              'input': '56rem',
            },
            animation: {
              'fade-in': 'fadeIn 250ms cubic-bezier(0.4, 0, 0.2, 1)',
              'fade-in-up': 'fadeInUp 300ms cubic-bezier(0.4, 0, 0.2, 1)',
              'slide-up': 'slideUp 200ms cubic-bezier(0.4, 0, 0.2, 1)',
              'pulse-dot': 'pulseDot 1.4s ease-in-out infinite',
              'typing-bounce': 'typingBounce 1.4s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(8px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              pulseDot: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.5' },
              },
              typingBounce: {
                '0%, 80%, 100%': { transform: 'translateY(0)' },
                '40%': { transform: 'translateY(-6px)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
      }

      html {
        scroll-behavior: smooth;
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
